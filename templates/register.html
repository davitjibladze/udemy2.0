{% extends 'base.html' %}
{% block title %}რეგისტრაცია{% endblock %}
{% block content %}
<section class="auth-section"><div class="auth-card card">
<h1>რეგისტრაცია</h1>
<form method="post" class="stack-form">
  <label>სრული სახელი<input type="text" name="full_name"></label>
  <label>ელფოსტა<input type="email" name="email"></label>
  <label>პაროლი<input type="password" name="password"></label>
  <button class="btn">ანგარიშის შექმნა</button>
</form>
</div></section>
{% endblock %}
